name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN is not set"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID is not set"
            exit 1
          fi
          echo "✅ Secrets are configured"

      - name: Deploy to Cloudflare Pages
        run: |
          echo "🚀 Starting deployment..."
          export CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          export CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          
          # Vérifier que les variables sont bien définies
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN is empty"
            exit 1
          fi
          
          # Déployer
          npx wrangler pages deploy dist --project-name=gxomoissyprocedures

      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed!"
          echo "🌐 Production URL: https://gxomoissyprocedures.pages.dev"
          echo "📊 Chef d'Équipe KPI: https://gxomoissyprocedures.com/chef-equipe?v=2"
